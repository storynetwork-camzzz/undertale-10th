<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    <title>UNDERTALE 10th Anniversary</title>

    <script>
      // ── Service Worker (blob) ─────────────────────────────────────────────
      // Needed for COOP/COEP headers (SharedArrayBuffer / WASM threading).
      const SW_CODE = `
        self.addEventListener("install", () => self.skipWaiting());
        self.addEventListener("activate", e => e.waitUntil(self.clients.claim()));
        self.addEventListener("fetch", event => {
          event.respondWith((async () => {
            let response;
            try { response = await fetch(event.request); }
            catch(e) { return new Response("Network error", { status: 503 }); }
            const h = new Headers(response.headers);
            h.set("Cross-Origin-Opener-Policy", "same-origin");
            h.set("Cross-Origin-Embedder-Policy", "require-corp");
            h.set("Cross-Origin-Resource-Policy", "cross-origin");
            return new Response(response.body, { status: response.status, statusText: response.statusText, headers: h });
          })());
        });
      `;
      if ("serviceWorker" in navigator) {
        const blob = new Blob([SW_CODE], { type: "application/javascript" });
        navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: "./" }).then(reg => {
          if (reg.installing || reg.waiting) {
            navigator.serviceWorker.addEventListener("controllerchange", () => window.location.reload());
          }
        });
      }

      // ── BASE URL ──────────────────────────────────────────────────────────
      const BASE = "https://cdn.jsdelivr.net/gh/storynetwork-camzzz/undertale-10th@a8c355e/undertale-gh-pages/";

      // ── Fake window.oprt.gameFiles ────────────────────────────────────────
      // runner.js ONLY loads game.unx through window.oprt.gameFiles.
      // Without this, the WAD is never fetched and the game crashes.
      // We implement the exact API the runner expects:
      //   keys()                          → Promise<[]>  (empty = nothing cached yet)
      //   delete(fileId, version)         → Promise<void>
      //   fetchAndCache(fileId, ver, req) → Promise<Response>  (fetches & stores in memory)
      //   match(fileId, version)          → Promise<Response>  (returns stored response)
      (function() {
        const store = {}; // fileId → ArrayBuffer

        window.oprt = {
          gameFiles: {
            // Return empty list so runner thinks nothing is cached yet,
            // triggering a fresh fetchAndCache of game.unx.
            keys() {
              return Promise.resolve([]);
            },

            delete(fileId, version) {
              delete store[fileId];
              return Promise.resolve();
            },

            // Called by __gx_cache_file to download and store game.unx.
            // We fetch with Accept-Encoding: identity to get raw uncompressed bytes.
            fetchAndCache(fileId, version, request) {
              const filename = fileId.split(":")[0]; // e.g. "game.unx"
              const url = BASE + filename;
              return fetch(url, {
                headers: { "Accept-Encoding": "identity" }
              }).then(resp => {
                if (!resp.ok) throw new Error("Failed to fetch " + url + " status=" + resp.status);
                return resp.arrayBuffer();
              }).then(buf => {
                store[fileId] = buf;
                // Return a Response-like object so arrayBuffer() works downstream
                return new Response(buf.slice(0), {
                  status: 200,
                  headers: { "Content-Type": "application/octet-stream" }
                });
              });
            },

            // Called by __gx_async_wget2 when the WASM actually needs the file data.
            match(fileId, version) {
              if (store[fileId]) {
                return Promise.resolve(new Response(store[fileId].slice(0), {
                  status: 200,
                  headers: { "Content-Type": "application/octet-stream" }
                }));
              }
              // Not cached yet — fetch it now
              const filename = fileId.split(":")[0];
              const url = BASE + filename;
              return fetch(url, {
                headers: { "Accept-Encoding": "identity" }
              }).then(resp => resp.arrayBuffer()).then(buf => {
                store[fileId] = buf;
                return new Response(buf.slice(0), {
                  status: 200,
                  headers: { "Content-Type": "application/octet-stream" }
                });
              });
            }
          }
        };
      })();
    </script>

    <style>
      html { background: #000000; }
      body {
        font-family: arial;
        margin: 0; padding: 0;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        min-height: fill-available;
        min-height: 100svh;
        min-width: 100vw;
        background: #000000;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        place-items: center;
      }
      .emscripten { padding-right: 0; display: block; }
      div.emscripten { text-align: center; }
      .nsmessage { padding-right: 0; display: inline-block; vertical-align: top; font-weight: bold; color: white; }
      div.nsmessage { text-align: center; }
      canvas.emscripten {
        display: none;
        border: 0px none;
        outline: none;
        background-color: black;
        position: relative;
        opacity: 0;
        margin-top: auto;
        margin-bottom: auto;
        image-rendering: optimizeSpeed;
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: -o-crisp-edges;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
      }
      canvas.active { opacity: 1; }
      #status { display: inline-block; vertical-align: top; font-weight: bold; color: white; }
      div.loading {
        position: absolute; top: 0; bottom: 0; left: 0; right: 0;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        pointer-events: none;
      }
      div.loading > * { padding: 10px; margin: 10px; }
    </style>
  </head>

  <body>
    <canvas
      class="emscripten"
      id="canvas"
      oncontextmenu="event.preventDefault()"
      onclick="resume()"
      tabindex="-1"
    ></canvas>
    <div class="loading">
      <noscript class="nsmessage">This requires JavaScript and WebAssembly to be enabled in your browser.</noscript>
      <div class="emscripten" id="status">Loading...</div>
    </div>

    <script id="tick-worker" type="javascript/worker">
      let running = false, stop_called = false, intervalMs = 16;
      onmessage = (e) => {
        if (e.data.run) {
          intervalMs = Math.floor(1000 / e.data.fps);
          if (!running) { running = true; setTimeout(tick, intervalMs); }
        } else { stop_called = true; }
      }
      const tick = () => {
        if (stop_called) { stop_called = false; running = false; return; }
        const start = new Date().getTime();
        postMessage('');
        const end = new Date().getTime();
        let next = start + intervalMs - end;
        setTimeout(tick, Math.max(next, 0));
      }
    </script>

    <script type="text/javascript">
      const blob = new Blob([document.querySelector('#tick-worker').textContent]);
      const worker = new Worker(window.URL.createObjectURL(blob));
      worker.onmessage = function () { GM_tick(performance.now()); }

      if ("getGamepads" in navigator) {
        const sendGamepadInfo = (id) => {
          const firefoxRegex = /^([0-9a-fA-F]{4})-([0-9a-fA-F]{4})-(.*)$/;
          const chromeRegex = /^(.*) ?\(.*[vV][eE][nN][dD][oO][rR]: ?([0-9a-fA-F]{4}).*[pP][rR][oO][dD][uU][cC][tT]: ?([0-9a-fA-F]{4})\)$/;
          let name = "", vendor = "", product = "";
          const fm = id.match(firefoxRegex);
          if (fm) { name = fm[3]; vendor = fm[1]; product = fm[2]; }
          else { const cm = id.match(chromeRegex); if (cm) { name = cm[1]; vendor = cm[2]; product = cm[3]; } }
          name = name.toLowerCase(); vendor = vendor.toLowerCase(); product = product.toLowerCase();
          let ps = false, dualsense = false;
          if (name.includes("dualsense") || name.includes("ps5")) { ps = true; dualsense = true; }
          else if (vendor == "054c" || name.includes("playstation") || name.includes("dualshock") || name.includes("ps3") || name.includes("ps4")) { ps = true; }
          window.postMessage({ gamepadIsPlaystation: ps, gamepadIsDualsense: dualsense });
        };
        window.addEventListener("gamepadconnected", (e) => sendGamepadInfo(e.gamepad.id));
        setInterval(() => {
          for (const gp of navigator.getGamepads()) {
            if (!gp) continue;
            let activity = false;
            for (let i = 0; i < gp.axes.length; i++) activity |= Math.abs(gp.axes[i]) >= 0.4;
            for (let i = 0; i < gp.buttons.length; i++) activity |= gp.buttons[i].pressed;
            if (activity) { sendGamepadInfo(gp.id); break; }
          }
        }, 16);
      }

      window.addEventListener("message", (message) => {
        if (message && message.data === "attempt_enter_fullscreen") {
          if (/^((?!chrome|android).)*safari/i.test(navigator.userAgent)) return;
          setTimeout(() => { if (document.body.requestFullscreen) document.body.requestFullscreen(); }, 100);
        }
      });
    </script>

    <script type="text/javascript">
      var statusElement = document.getElementById("status");
      var canvasElement = document.getElementById("canvas");
      canvasElement.addEventListener("click", function() { canvasElement.focus(); });

      var actualDocumentTitle = document.title;
      Object.defineProperty(document, "title", {
        set: function(val) {},
        get: function() { return actualDocumentTitle; }
      });

      var startingHeight, startingWidth, startingAspect;

      var Module = {
        preRun: [],
        postRun: [],
        locateFile: function(path) { return BASE + path; },
        print: (function() {
          return function(text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
            if (text === "Entering main loop.") ensureAspectRatio();
          };
        })(),
        printErr: function(text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
          console.error(text);
        },
        canvas: (function() { return document.getElementById("canvas"); })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: "" };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          if (text.includes("Downloading data...")) text = "Downloading data...";
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) { text = m[1]; }
          else { if (!text) { canvasElement.style.display = "block"; } }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
        },
      };
      Module.setStatus("Downloading...");
      if (typeof window === "object") { Module['arguments'] = []; }

      var g_pWadLoadCallback = undefined;
      function setWadLoadCallback(_cb) { g_pWadLoadCallback = _cb; }
      var g_pAddAsyncMethod = -1;
      function setAddAsyncMethod(m) { g_pAddAsyncMethod = m; }
      var g_pJSExceptionHandler = undefined;
      function setJSExceptionHandler(h) { if (typeof h == "function") g_pJSExceptionHandler = h; }
      function hasJSExceptionHandler() { return typeof g_pJSExceptionHandler == "function"; }
      function doJSExceptionHandler(json) { if (typeof g_pJSExceptionHandler == "function") g_pJSExceptionHandler(JSON.parse(json)); }

      function manifestFiles() {
        return ["runner.data", "runner.js", "runner.wasm", "audio-worklet.js", "game.unx"].join(";");
      }
      function manifestFilesMD5() {
        return ["4fcfa3acd68441ef6a5c95bd1e924fd3", "b545e69455e5add6925e78db228f0d1a", "54facb1a5bb9a9f44824c3a32b9d289f", "e8f1e8db8cf996f8715a6f2164c2e44e", "983302700fde08ece4f3fd6baa89a876"];
      }

      function onFirstFrameRendered() {}

      function onGameSetWindowSize(width, height) {
        startingHeight = height; startingWidth = width;
        startingAspect = startingWidth / startingHeight;
        ensureAspectRatio();
      }

      function ensureAspectRatio() {
        if (!canvasElement || startingHeight === undefined) return;
        canvasElement.classList.add("active");
        const maxWidth = window.innerWidth, maxHeight = window.innerHeight;
        var newHeight, newWidth;
        if (startingHeight / maxHeight > startingWidth / maxWidth) {
          newHeight = maxHeight; newWidth = newHeight * startingAspect;
        } else {
          newWidth = maxWidth; newHeight = newWidth / startingAspect;
        }
        canvasElement.style.height = newHeight + "px";
        canvasElement.style.width = newWidth + "px";
      }

      function pause() {
        if (!canvasElement.classList.contains("active")) return;
        GM_pause(); canvasElement.classList.add("paused");
      }
      function resume() {
        GM_unpause(); canvasElement.classList.remove("paused");
        canvasElement.classList.add("unpaused"); ensureAspectRatio();
      }

      const resizeObserver = new ResizeObserver(() => {
        window.requestAnimationFrame(ensureAspectRatio);
        setTimeout(() => window.requestAnimationFrame(ensureAspectRatio), 100);
      });
      resizeObserver.observe(document.body);
      setInterval(() => window.requestAnimationFrame(ensureAspectRatio), 1000);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState != "visible") pause();
      });

      setWadLoadCallback(() => {});
    </script>

    <script async type="text/javascript" src="https://cdn.jsdelivr.net/gh/storynetwork-camzzz/undertale-10th@a8c355e/undertale-gh-pages/runner.js"></script>
  </body>
</html>
